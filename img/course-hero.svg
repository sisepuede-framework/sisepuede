<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="SISEPUEDE Course">
  <title>SISEPUEDE Course</title>
  <!-- Background -->
  <rect width="1200" height="400" fill="#FFFFFF"/>

  <!-- Swiss editorial grid -->
  <g stroke="#E5E7EB" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Left: logo mark -->
  <g transform="translate(60,140)">
    <g fill="#0F766E">
      <rect x="0"  y="80" width="16" height="40"/>
      <rect x="22" y="65" width="16" height="55"/>
      <rect x="44" y="50" width="16" height="70"/>
      <rect x="66" y="35" width="16" height="85"/>
      <rect x="88" y="20" width="16" height="100"/>
    </g>
    <g fill="#EA580C">
      <rect x="112" y="0" width="12" height="80"/>
      <polygon points="100,75 136,75 118,105"/>
    </g>
  </g>

  <!-- Center: typographic treatment -->
  <text x="600" y="225"
        text-anchor="middle"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-weight="800"
        font-size="92"
        letter-spacing="-3"
        fill="#0F172A">SISEPUEDE</text>
  <text x="600" y="260"
        text-anchor="middle"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-weight="500"
        font-size="18"
        letter-spacing="6"
        fill="#475569">DECARBONIZATION UNDER DEEP UNCERTAINTY</text>

  <!-- Right: 5 sector squares -->
  <g transform="translate(930,165)">
    <rect x="0"   y="0" width="40" height="40" fill="#15803D"/>
    <rect x="48"  y="0" width="40" height="40" fill="#D97706"/>
    <rect x="96"  y="0" width="40" height="40" fill="#7C3AED"/>
    <rect x="144" y="0" width="40" height="40" fill="#0891B2"/>
    <rect x="192" y="0" width="40" height="40" fill="#475569"/>
  </g>
</svg>
